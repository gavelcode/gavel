name: gavel
projects:
  - name: core
    pattern: //core/...
    tooling:
      go: [golangci-lint, archtest]
    quality_gate:
      findings:
        max_error: 0
      coverage:
        min: 90
      architecture_violations:
        max: 0

  - name: cli
    pattern: //apps/cli/...
    tooling:
      go: [golangci-lint, archtest]
    quality_gate:
      findings:
        max_error: 0
      coverage:
        min: 90
      architecture_violations:
        max: 0

  - name: server
    pattern: //apps/server/...
    tooling:
      go: [golangci-lint, archtest]
    quality_gate:
      findings:
        max_error: 0
      coverage:
        min: 90
      architecture_violations:
        max: 0

  - name: web
    pattern: //apps/web/...
    tooling:
      typescript: [eslint, archtest]
    quality_gate:
      findings:
        max_error: 0
      coverage:
        min: 90
      architecture_violations:
        max: 0

  - name: tools
    pattern: //tools/...
    tooling:
      go: [golangci-lint, archtest]
    quality_gate:
      findings:
        max_error: 0
      coverage:
        min: 90
      architecture_violations:
        max: 0
