version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule: { interval: weekly }
    groups:
      go: { patterns: ["*"] }
  - package-ecosystem: npm
    directory: /apps/web
    schedule: { interval: weekly }
    groups:
      web: { patterns: ["*"] }
  - package-ecosystem: github-actions
    directory: /
    schedule: { interval: weekly }
    groups:
      actions: { patterns: ["*"] }
