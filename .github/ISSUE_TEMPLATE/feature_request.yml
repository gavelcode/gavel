name: Feature request
description: Something Gavel should do.
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What are you trying to do that Gavel makes hard today?
    validations: { required: true }
  - type: textarea
    id: proposal
    attributes:
      label: What you'd like
      description: The behavior or command you have in mind.
