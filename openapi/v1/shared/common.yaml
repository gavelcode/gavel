# Shared OpenAPI components used across every bounded context.
# Child files reference these via cross-file $ref (e.g.
# ../shared/common.yaml#/components/responses/BadRequest).

components:
  parameters:
    Limit:
      name: limit
      in: query
      required: false
      description: Maximum number of items to return. Defaults to 50, capped at 200.
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    Cursor:
      name: cursor
      in: query
      required: false
      description: Opaque cursor returned by the previous page's `next_cursor`.
      schema:
        type: string

  responses:
    BadRequest:
      description: Request body is malformed or violates an invariant.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
    Unauthorized:
      description: No valid credentials were presented.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
    Forbidden:
      description: Caller is authenticated but lacks the required role.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
    NotFound:
      description: The requested resource does not exist or is not visible to the caller.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
    InvalidCredentials:
      description: Credentials were presented but rejected.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
    CurrentPasswordIncorrect:
      description: The supplied `current_password` does not match the stored hash.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'

  schemas:
    Problem:
      description: |
        Error envelope per RFC 7807. `type` is a URI reference that callers
        can switch on; `title` is a short human-readable phrase.
      type: object
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri-reference
          example: about:blank
        title:
          type: string
        status:
          type: integer
          format: int32
        detail:
          type: string
        instance:
          type: string
          format: uri-reference
