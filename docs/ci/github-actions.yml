# Gavel CI — GitHub Actions
#
# Prerequisites:
#   1. A running Gavel server (self-hosted or managed)
#   2. Repository secrets:
#      - GAVEL_SERVER_URL: e.g. https://gavel.internal.example.com
#      - GAVEL_TOKEN:      API token with "ingest" scope (gav_...)
#
# This workflow runs on every push and pull request to the main branch.
# It builds with Bazel, judges the quality gate, submits results to the Gavel
# server, and posts the verdict back to the pull request as a GitHub check.
# The pipeline fails if the quality gate verdict is "fail".
#
# The "Report to the PR" step is independent of server mode: it needs only the
# built-in GITHUB_TOKEN and the checks:write permission declared below.

name: Gavel Quality Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gavel:
    runs-on: ubuntu-latest
    permissions:
      checks: write  # required for the "Report to the PR" step
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for baseline delta

      - name: Mount Bazel cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: bazel-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'go.mod') }}
          restore-keys: |
            bazel-${{ runner.os }}-

      - name: Install Gavel CLI
        run: |
          # Replace with your preferred installation method:
          #   - Download binary from GitHub releases
          #   - Build from source: bazel build //apps/cli/cmd/gavel
          #   - Use a pre-built container image
          echo "Install gavel CLI here"

      - name: Run Gavel judge
        env:
          GAVEL_SERVER_URL: ${{ secrets.GAVEL_SERVER_URL }}
          GAVEL_TOKEN: ${{ secrets.GAVEL_TOKEN }}
        run: |
          gavel judge \
            --server="${GAVEL_SERVER_URL}" \
            --token="${GAVEL_TOKEN}" \
            --require-submit \
            --commit="${GITHUB_SHA}" \
            --branch="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
        # Exit code 1 = quality gate failed → pipeline fails
        # --require-submit ensures submission failure also fails the pipeline

      - name: Report the verdict to the PR
        if: always()  # post the check even when the gate failed
        run: gavel report
        # Uses the built-in GITHUB_TOKEN + checks:write (declared above) and
        # reads the verdict judge cached locally. Works with or without server
        # mode. On fork PRs the token is read-only, so this step is skipped
        # there — see docs/ci.md.
