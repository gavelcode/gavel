name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "2.16.0"
          args: release --clean
        env:
          # Publishes the GitHub Release on gavelcode/gavel.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Pushes the Homebrew cask to gavelcode/homebrew-tap (a different
          # repo, so the default GITHUB_TOKEN cannot reach it). Set this repo
          # secret to a PAT with write access to gavelcode/homebrew-tap.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
