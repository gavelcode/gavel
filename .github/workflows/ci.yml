name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Cache Bazel
        uses: actions/cache@v6
        with:
          path: ~/.cache/bazel
          key: bazel-${{ runner.os }}-${{ hashFiles('MODULE.bazel.lock', '.bazelversion') }}
          restore-keys: bazel-${{ runner.os }}-

      - name: Install Bazelisk
        run: |
          sudo curl -fsSL -o /usr/local/bin/bazel \
            https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64
          sudo chmod +x /usr/local/bin/bazel

      - name: Build
        run: bazel build //...

      - name: Test
        run: bazel test //...

      - name: Coverage
        run: bazel coverage //core/... --combined_report=lcov || true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: bazel-out/_coverage/_coverage_report.dat
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Collect JUnit test reports
        if: always()
        run: |
          mkdir -p test-results
          find -L bazel-testlogs -name test.xml 2>/dev/null \
            | while read -r f; do cp "$f" "test-results/$(echo "$f" | tr '/' '_')"; done

      - name: Upload test results to Codecov
        if: always()
        uses: codecov/test-results-action@v1
        with:
          directory: test-results
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # Dogfooding gate: gavel judges itself across all five projects. This is the
  # only job that exercises the analyzer aspects end-to-end — a stale ESLint
  # store-repair path silently broke the TypeScript aspect because nothing in CI
  # ran `gavel judge`.
  dogfood:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    # Building every analyzer aspect from a cold Bazel cache takes ~18 min; warm
    # runs are far quicker. Kept above the 10-min cap of the other jobs so a cold
    # cache does not spuriously fail the gate.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Cache Bazel
        uses: actions/cache@v6
        with:
          path: ~/.cache/bazel
          key: bazel-${{ runner.os }}-${{ hashFiles('MODULE.bazel.lock', '.bazelversion') }}
          restore-keys: bazel-${{ runner.os }}-

      - name: Install Bazelisk
        run: |
          sudo curl -fsSL -o /usr/local/bin/bazel \
            https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64
          sudo chmod +x /usr/local/bin/bazel

      # gavel judge collects web coverage by running `npx vitest run` in
      # apps/web, so it needs Node on PATH and the web devDependencies installed.
      - uses: actions/setup-node@v7
        with:
          node-version: "22"

      - name: Install pnpm
        run: npm install -g pnpm@9.15.4

      - name: Install web deps
        run: cd apps/web && pnpm install --frozen-lockfile

      - name: Build gavel CLI
        run: bazel build //apps/cli/cmd/gavel

      - name: Judge (gavel gates itself)
        run: bazel-bin/apps/cli/cmd/gavel/gavel_/gavel judge

      - name: Report the verdict to the PR
        if: always() && github.event.pull_request.head.repo.full_name == github.repository
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: bazel-bin/apps/cli/cmd/gavel/gavel_/gavel report --commit "$HEAD_SHA" --pr "$PR_NUMBER"

  # Guards generated artifacts against drift from their source of truth:
  # OpenAPI (Go DTOs + TS client) and the clispec (CLI flags.gen.go).
  drift:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: "1.25"

      - uses: actions/setup-node@v7
        with:
          node-version: "22"

      - name: Install pnpm
        run: npm install -g pnpm@9.15.4

      - name: Install web deps
        run: cd apps/web && pnpm install --frozen-lockfile

      - name: Install Bazelisk
        run: |
          sudo curl -fsSL -o /usr/local/bin/bazel \
            https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64
          sudo chmod +x /usr/local/bin/bazel

      - name: OpenAPI drift (Go + TS generated clients)
        run: make openapi-check

      - name: CLI spec drift (flags.gen.go)
        run: make clispec-check

      - name: Catalog drift (embedded gavel_tools catalog)
        run: make catalog-check

  # Onboarding proof: the *distributed* binary — a standalone CGO-free `go
  # build`, the same shape goreleaser ships, with no Bazel runfiles — must drive
  # `gavel init` then `gavel judge` on a workspace it did not build itself. This
  # is what caught the catalog-runfiles panic that made every shipped binary
  # unusable. Linux covers all four examples; one macOS leg proves the darwin
  # binary we ship actually runs. Windows is not supported. The examples
  # intentionally fail coverage/architecture, so the gate keys off
  # tool_execution alone, not the overall verdict.
  onboarding:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        example: [go-repo, java-repo, python-repo, rust-fullstack-repo]
        include:
          - os: macos-latest
            example: go-repo
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: "1.25"

      - name: Cache Bazel
        uses: actions/cache@v6
        with:
          path: ~/.cache/bazel
          key: bazel-onboarding-${{ matrix.os }}-${{ matrix.example }}-${{ hashFiles('MODULE.bazel.lock', '.bazelversion') }}
          restore-keys: bazel-onboarding-${{ matrix.os }}-${{ matrix.example }}-

      - uses: actions/setup-node@v7
        with:
          node-version: "22"

      # @bazel/bazelisk gives a cross-OS `bazel`; gavel judge shells out to it to
      # run the analyzer aspects. pnpm is for the frontend example's coverage.
      - name: Install Bazelisk and pnpm
        run: npm install -g @bazel/bazelisk pnpm@9.15.4

      # gavel collects TypeScript coverage by running `npx vitest run` in the
      # project directory, so a frontend example needs its host node_modules.
      - name: Install example frontend deps
        run: |
          if [ -f "examples/${{ matrix.example }}/frontend/package.json" ]; then
            cd "examples/${{ matrix.example }}/frontend"
            pnpm install --frozen-lockfile
          fi

      # Build the binary the way it ships — standalone, CGO-free, no runfiles — so
      # this exercises the artifact a user downloads. goreleaser stays the tool of
      # record for real releases (hack/release.sh).
      - name: Build the distributed gavel binary
        run: CGO_ENABLED=0 go build -o "$RUNNER_TEMP/gavel" ./apps/cli/cmd/gavel

      - name: Onboard and judge with the distributed binary
        run: |
          cd "examples/${{ matrix.example }}"
          "$RUNNER_TEMP/gavel" init --from=.gavel/gavel.yaml --force
          "$RUNNER_TEMP/gavel" judge --json > result.json || true
          echo "tool_execution per project:"
          jq -r '.projects[] | "  \(.name): \([.rulings[] | select(.subtype == "tool_execution").passed][0])"' result.json
          jq -e '([.projects[].rulings[] | select(.subtype == "tool_execution")]) as $te
                 | ($te | length > 0) and ($te | all(.passed == true))' result.json > /dev/null \
            || { echo "::error::an analyzer failed to run (tool_execution) in ${{ matrix.example }} on ${{ matrix.os }}"; exit 1; }

      # New-vs-baseline proof: go-repo commits a fixture (baseline_probe.go) that
      # is deliberately kept out of the baseline, so judge must report a known,
      # exact delta across all three signals. Asserting *known values* — not just
      # "zero new" — is what catches a silent regression (a stray exclude, an
      # analyzer that stopped running): a zero would pass for the wrong reason.
      # The linux+darwin legs together prove the verdict reproduces off the
      # author's machine. These golden values change only when the fixture does;
      # update them in the same PR.
      - name: Assert the new-vs-baseline delta (fixture proof)
        if: matrix.example == 'go-repo'
        working-directory: examples/go-repo
        run: |
          fail() { echo "::error::$1 on ${{ matrix.os }}"; exit 1; }
          jq -e '.projects[] as $p
            | ($p.delta.new_count == 4)
              and ([$p.findings[] | select(.status == "new")] | length == 4)
              and ([$p.findings[] | select(.status == "new") | .file_path]
                    | all(test("baseline_probe.go")))' result.json > /dev/null \
            || fail "findings delta not reproducible (expected 4 new, all in baseline_probe.go)"
          jq -e '.projects[] as $p
            | ($p.delta.new_violations_count == 1)
              and ([$p.violations[]? | select(.status == "new")
                    | "\(.rule):\(.source_pkg):\(.target_pkg)"]
                    == ["domain-imports-nothing:domain:infrastructure"])' result.json > /dev/null \
            || fail "architecture delta not reproducible (expected 1 new domain->infrastructure violation)"
          jq -e '[.projects[].coverage_by_file[]? | select(.file_path | test("baseline_probe.go"))] as $probe
            | ($probe | length == 1) and ($probe[0].is_new == true) and ($probe[0].covered_lines == 0)' result.json > /dev/null \
            || fail "coverage delta not reproducible (expected baseline_probe.go new and fully uncovered)"
          echo "new-vs-baseline delta reproduced: 4 new findings, 1 new arch violation, 1 new uncovered file"
