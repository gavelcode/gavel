name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: bazel-${{ runner.os }}-${{ hashFiles('MODULE.bazel.lock', '.bazelversion') }}
          restore-keys: bazel-${{ runner.os }}-

      - name: Install Bazelisk
        run: |
          sudo curl -fsSL -o /usr/local/bin/bazel \
            https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64
          sudo chmod +x /usr/local/bin/bazel

      - name: Build
        run: bazel build //...

      - name: Test
        run: bazel test //...

      - name: Coverage
        run: bazel coverage //core/... --combined_report=lcov || true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: bazel-out/_coverage/_coverage_report.dat
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Collect JUnit test reports
        if: always()
        run: |
          mkdir -p test-results
          find -L bazel-testlogs -name test.xml 2>/dev/null \
            | while read -r f; do cp "$f" "test-results/$(echo "$f" | tr '/' '_')"; done

      - name: Upload test results to Codecov
        if: always()
        uses: codecov/test-results-action@v1
        with:
          directory: test-results
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # Dogfooding gate: gavel judges itself across all five projects. This is the
  # only job that exercises the analyzer aspects end-to-end — a stale ESLint
  # store-repair path silently broke the TypeScript aspect because nothing in CI
  # ran `gavel judge`.
  dogfood:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    # Building every analyzer aspect from a cold Bazel cache takes ~18 min; warm
    # runs are far quicker. Kept above the 10-min cap of the other jobs so a cold
    # cache does not spuriously fail the gate.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: bazel-${{ runner.os }}-${{ hashFiles('MODULE.bazel.lock', '.bazelversion') }}
          restore-keys: bazel-${{ runner.os }}-

      - name: Install Bazelisk
        run: |
          sudo curl -fsSL -o /usr/local/bin/bazel \
            https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64
          sudo chmod +x /usr/local/bin/bazel

      # gavel judge collects web coverage by running `npx vitest run` in
      # apps/web, so it needs Node on PATH and the web devDependencies installed.
      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install pnpm
        run: npm install -g pnpm@9.15.4

      - name: Install web deps
        run: cd apps/web && pnpm install --frozen-lockfile

      - name: Build gavel CLI
        run: bazel build //apps/cli/cmd/gavel

      - name: Judge (gavel gates itself)
        run: bazel-bin/apps/cli/cmd/gavel/gavel_/gavel judge

      - name: Report the verdict to the PR
        if: always() && github.event.pull_request.head.repo.full_name == github.repository
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: bazel-bin/apps/cli/cmd/gavel/gavel_/gavel report --commit "$HEAD_SHA" --pr "$PR_NUMBER"

  # Guards generated artifacts against drift from their source of truth:
  # OpenAPI (Go DTOs + TS client) and the clispec (CLI flags.gen.go).
  drift:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install pnpm
        run: npm install -g pnpm@9.15.4

      - name: Install web deps
        run: cd apps/web && pnpm install --frozen-lockfile

      - name: Install Bazelisk
        run: |
          sudo curl -fsSL -o /usr/local/bin/bazel \
            https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64
          sudo chmod +x /usr/local/bin/bazel

      - name: OpenAPI drift (Go + TS generated clients)
        run: make openapi-check

      - name: CLI spec drift (flags.gen.go)
        run: make clispec-check
